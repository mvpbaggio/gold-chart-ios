name: Build IPA (TrollStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project GoldChart.xcodeproj \
            -scheme GoldChart \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath Build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            build

      - name: Package IPA
        run: |
          APP=$(find Build -name "*.app" -type d | head -1)
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          IPA="GoldChart-v1.0-build${{ github.run_number }}.ipa"
          zip -r "$IPA" Payload/
          echo "ipa=$IPA" >> $GITHUB_OUTPUT
          echo "Packed: $IPA"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GoldChart-IPA
          path: GoldChart-*.ipa
          if-no-files-found: error
